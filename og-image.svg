<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="topline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="40%" style="stop-color:#C9A84C"/>
      <stop offset="60%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <linearGradient id="leftbar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="30%" style="stop-color:#C9A84C"/>
      <stop offset="70%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Grid pattern (right side, faint) -->
  <rect x="680" y="80" width="460" height="460" fill="url(#grid)" opacity="0.06"/>

  <!-- Top gold line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#topline)"/>

  <!-- Left gold bar -->
  <rect x="0" y="0" width="4" height="630" fill="url(#leftbar)"/>

  <!-- Bottom faint line -->
  <rect x="0" y="629" width="1200" height="1" fill="#C9A84C" opacity="0.2"/>

  <!-- Logo -->
  <text x="80" y="110" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#C9A84C" letter-spacing="4">FISCAL</text>
  <text x="158" y="110" font-family="Georgia, serif" font-size="16" font-weight="400" fill="rgba(250,250,247,0.45)" letter-spacing="4">BLUEPRINT</text>

  <!-- Headline line 1 -->
  <text x="80" y="230" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#FAFAF7">How much tax could you</text>

  <!-- Headline line 2 (gold) -->
  <text x="80" y="305" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#C9A84C">legally stop paying?</text>

  <!-- Divider line -->
  <rect x="80" y="340" width="48" height="2" fill="#C9A84C" opacity="0.6"/>

  <!-- Subtext -->
  <text x="80" y="395" font-family="Arial, sans-serif" font-size="20" font-weight="300" fill="rgba(250,250,247,0.55)">6 questions. 60 seconds. Your personalised tax simulation.</text>

  <!-- Pill background -->
  <rect x="80" y="440" width="350" height="42" rx="21" fill="rgba(201,168,76,0.08)" stroke="#C9A84C" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Pill dot -->
  <circle cx="106" cy="461" r="5" fill="#C9A84C"/>

  <!-- Pill text -->
  <text x="122" y="466" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#C9A84C" letter-spacing="2">FREE · FISCAL-BLUEPRINT.COM</text>
</svg>
